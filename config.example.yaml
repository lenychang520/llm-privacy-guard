# LLM Privacy Guard Configuration
# Place in one of these locations to take effect:
#   1. Current working directory
#   2. llm_filter/ directory
#   3. ~/.llm-privacy-guard/

# ── Preprocess pipeline ──
preprocess:
  # Remove zero-width characters (e.g. \\u200b) to prevent character-level bypass
  strip_zw_chars: true
  # URL decode (%3A → : etc.) to prevent urlencode bypass
  url_decode: true
  # HTML entity decode (&#64; → @ etc.) to prevent HTML entity bypass
  html_unescape: true

# ── Entropy detection ──
entropy:
  enabled: true
  threshold: 5.0
  min_length: 12
  mode: "auto"

# ── Built-in rule toggles ──
rules:
  ipv4: true
  ipv4_hex: true
  ipv6: true
  ipv6_hyphen: true
  uuid: true
  uuid_hex: true
  email: true
  phone_cn: true
  phone_cn_sep: true
  phone_intl: true
  id_card_cn: true
  id_card_cn_sep: true
  ssn_us: true
  api_key_prefix: true
  aws_access_key: true
  ssh_private_key: true
  ssh_public_key: true     # SSH public key (ssh-rsa/ed25519/... AAAA...)
  sha_hash: true           # 64-char hex hash (SHA256 etc.)
  github_token: true
  jwt: true
  jwt_multiline: true
  db_connection_string: true
  db_cli: true
  credit_card: true
  credential_value: true
  url_query_credential: true   # URL query-string credentials (?pass=...)
  credential_inline: true      # Inline credentials (comments/heredoc/logs etc.)

# ── Custom rules ──
# Each rule has: name (unique), pattern (regex), placeholder (replacement text)
custom_rules: []
  # - name: "my_api_domain"
  #   pattern: "api\\.my-company\\.com"
  #   placeholder: "[MY_API]"
  #
  # - name: "internal_project_id"
  #   pattern: "PROJ-\\d{8}-[A-Z]{4}"
  #   placeholder: "[PROJECT_ID]"

# ── Placeholder overrides ──
# Override default placeholders here if you prefer different labels
placeholders: {}
  # ipv4: "[IP_ADDRESS]"
  # uuid: "[IDENTIFIER]"
  # email: "[CONTACT]"

# ── Whitelist ──
whitelist:
  # Extra IP whitelist entries (built-in only preserves 0.0.0.0 and 255.255.255.255;
  # private IPs are also filtered by default)
  ips: []
  # Extra domain whitelist entries (built-in includes localhost, example.com etc.)
  domains: []
  # Exact-match string whitelist
  strings: []
